<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>TG Tag Manager PRO</title>
    <link rel="stylesheet" href="index.css"> <style>
        :root { --bg: #17212b; --card: #232e3c; --text: #f5f5f5; --accent: #5288c1; --warn: #e74c3c; --extra: #d35400; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 80px; background: var(--card); border: 1px solid #33404d; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin: 20px 0; }
        .card { background: var(--card); padding: 10px; border-radius: 8px; border: 2px solid #33404d; cursor: pointer; }
        .card.active { border-color: var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 8px; width: 80%; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram Tag Manager</h2>
    <textarea id="inputIds" placeholder="Введіть номери: 1, (31), 60"></textarea>
    <div style="margin-top:10px;">
        <button onclick="processInput()">Process IDs</button>
        <button onclick="toggleModal()" style="background:#3c4a5c;">Edit Base</button>
        <button onclick="clearCache()" style="background:#e74c3c;">Reset All</button>
    </div>

    <div id="opCounter" style="margin: 10px 0;">Вибрано: 0</div>
    <div class="grid" id="operatorGrid"></div>

    <textarea id="tagResult" readonly placeholder="Результат тегів..." style="margin-top:10px;"></textarea>
    <button onclick="copyTags()" style="margin-top:10px; width:100%;">Copy to Clipboard</button>
</div>

<div id="dbModal" class="modal">
    <div class="modal-content">
        <h3>Редагування бази</h3>
        <textarea id="dbEditor" style="width:100%; height: 300px; font-family: monospace;"></textarea>
        <div style="margin-top:10px;">
            <button onclick="saveDB()">Save & Reload</button>
            <button onclick="toggleModal()" style="background:#e74c3c;">Close</button>
        </div>
    </div>
</div>

<script src="script2.js"></script>

</body>
</html>
